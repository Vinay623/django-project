<!DOCTYPE html>
<html>
<head>
    <title>Campus Enrolment Manager</title>
    <style>

        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
        }

        .header {
            background-color: #417690;
            color: #f5dd5d;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: normal;
        }

        .top-links {
            background-color: #417690;
            color: white;
            padding: 0 40px 15px 40px;
            font-size: 14px;
        }

        .top-links a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }

        .container {
            padding: 30px 40px;
            background-color: white;
            min-height: 100vh;
        }

        h1, h2 {
            color: #333;
        }

        ul {
            padding-left: 20px;
        }

        button {
            background-color: #417690;
            color: white;
            border: none;
            padding: 10px 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2f5c72;
        }

        input, select {
            padding: 8px;
            margin-bottom: 10px;
            width: 250px;
        }
    </style>
</head>
<body>
    <div class="header">
        Campus Enrolment Manager
    </div>

    <div class="top-links">
        <a href="/">Home</a>
        <a href="/students/">Students</a>
        <a href="/courses/">Courses</a>
        <a href="/enrolments/">enrolments</a>
        <a href="/enrolments/new/">New Enrolments</a>
        <a href="/admin/">Admin</a>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
